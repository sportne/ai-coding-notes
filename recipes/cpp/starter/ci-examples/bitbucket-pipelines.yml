image: ubuntu:24.04

pipelines:
  default:
    - step:
        name: Quality Gate
        caches:
          - apt
        script:
          - apt-get update
          - apt-get install -y --no-install-recommends build-essential ca-certificates cmake ninja-build clang clang-tidy clang-format cppcheck
          - make ci
        artifacts:
          - build/**

definitions:
  caches:
    apt: /var/cache/apt
