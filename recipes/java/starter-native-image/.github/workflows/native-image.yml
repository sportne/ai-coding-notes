name: native-image

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "modules/project-app/**"
      - "modules/project-native-tests/**"
      - "build-logic/**"
      - "gradle/**"
      - "*.gradle"
      - "settings.gradle"

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          native-image-job-reports: true
      - name: Run native smoke
        run: ./gradlew nativeSmoke --console=plain
